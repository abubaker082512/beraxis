<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Beraxis — AI Voice (Ultra Fast)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.08);
      --accent: #6c5ce7;
      --accent2: #00cec9;
      --red: #e17055;
      --green: #55efc4;
      --text: #e0e6ff;
      --muted: #7f8aaa;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image: radial-gradient(ellipse at 20% 50%, rgba(108, 92, 231, .15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(0, 206, 201, .10) 0%, transparent 60%)
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 620px;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0, 0, 0, .4)
    }

    /* header */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px
    }

    .logo svg {
      width: 30px;
      height: 30px
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      background: rgba(85, 239, 196, .1);
      color: var(--green);
      border: 1px solid rgba(85, 239, 196, .2);
      border-radius: 20px;
      padding: 3px 10px;
      margin-left: auto
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px
    }

    p.sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.5
    }

    /* mic */
    .mic-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px
    }

    .mic-btn {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .2s;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 8px 32px rgba(108, 92, 231, .4)
    }

    .mic-btn.recording {
      background: linear-gradient(135deg, var(--red), #fd79a8);
      animation: pulse 1.2s infinite
    }

    .mic-btn svg {
      width: 36px;
      height: 36px;
      color: #fff;
      pointer-events: none
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(225, 112, 85, .6)
      }

      50% {
        box-shadow: 0 0 0 20px rgba(225, 112, 85, 0)
      }
    }

    #status-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      text-align: center
    }

    /* stats */
    .stats {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      justify-content: center
    }

    .stat-box {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border)
    }

    .stat-val {
      font-weight: 700;
      color: var(--accent2)
    }

    /* convo */
    .convo {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 300px;
      overflow-y: auto;
      padding-right: 4px;
      border-top: 1px solid var(--border);
      padding-top: 20px
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 13px;
      animation: fadeIn .3s ease
    }

    .msg.user {
      background: rgba(108, 92, 231, .1);
      border: 1px solid rgba(108, 92, 231, .2);
      align-self: flex-end
    }

    .msg.ai {
      background: rgba(0, 206, 201, .06);
      border: 1px solid rgba(0, 206, 201, .15);
      align-self: flex-start
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(5px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="8" fill="url(#g)" />
        <path d="M16 8v16M11 11v10M21 13v6M7 14v4M25 15v2" stroke="white" stroke-width="2" stroke-linecap="round" />
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
            <stop stop-color="#6c5ce7" />
            <stop offset="1" stop-color="#00cec9" />
          </linearGradient>
        </defs>
      </svg>
      <span>Beraxis AI</span>
      <div class="badge">ULTRA-LOW LATENCY</div>
    </div>

    <h1>Ultra-Fast Voice Test</h1>
    <p class="sub">Optimized for CPU. Single-trip streaming. <br>Target: Response start in under 1.5s after speech ends.
    </p>

    <div class="mic-wrap">
      <button class="mic-btn" id="micBtn">
        <svg id="iMic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z" />
          <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
          <line x1="12" y1="19" x2="12" y2="22" />
        </svg>
        <svg id="iStop" viewBox="0 0 24 24" fill="white" style="display:none">
          <rect x="6" y="6" width="12" height="12" rx="2" />
        </svg>
      </button>
      <div id="status-label">Click and Speak</div>
    </div>

    <div class="stats" id="stats" style="display:none">
      <div class="stat-box">STT: <span class="stat-val" id="s-stt">0</span>ms</div>
      <div class="stat-box">Total: <span class="stat-val" id="s-total">0</span>ms</div>
    </div>

    <div class="convo" id="convo"></div>
  </div>

  <script>
    const VOICE_URL = 'http://localhost:8000/api/v1/test/voice';

    const micBtn = document.getElementById('micBtn'), iMic = document.getElementById('iMic'), iStop = document.getElementById('iStop');
    const status = document.getElementById('status-label'), convo = document.getElementById('convo'), sStt = document.getElementById('s-stt'), sTotal = document.getElementById('s-total'), statsDisp = document.getElementById('stats');

    let isRecording = false, audioCtx = null, stream = null, processor = null, source = null, pcmBufs = [];
    let audioQueue = [], playing = false;

    function addMsg(who, text) { const d = document.createElement('div'); d.className = `msg ${who}`; d.textContent = text; convo.appendChild(d); convo.scrollTop = convo.scrollHeight }
    function b64ToBlob(b64) { const bin = atob(b64), arr = new Uint8Array(bin.length); for (let i = 0; i < bin.length; i++)arr[i] = bin.charCodeAt(i); return new Blob([arr], { type: 'audio/wav' }) }
    function playQueue() {
      if (!audioQueue.length) { playing = false; return }
      playing = true; const blob = audioQueue.shift(), url = URL.createObjectURL(blob), a = new Audio(url);
      a.onended = () => { URL.revokeObjectURL(url); playQueue() }; a.play().catch(playQueue);
    }

    // WAV Encoder
    function encodeWAV(samples) {
      const buf = new ArrayBuffer(44 + samples.length * 2), v = new DataView(buf);
      const w = (o, s) => { for (let i = 0; i < s.length; i++)v.setUint8(o + i, s.charCodeAt(i)) };
      w(0, 'RIFF'); v.setUint32(4, 36 + samples.length * 2, true); w(8, 'WAVE'); w(12, 'fmt '); v.setUint32(16, 16, true);
      v.setUint16(20, 1, true); v.setUint16(22, 1, true); v.setUint32(24, 16000, true); v.setUint32(28, 32000, true);
      v.setUint16(32, 2, true); v.setUint16(34, 16, true); w(36, 'data'); v.setUint32(40, samples.length * 2, true);
      for (let i = 0; i < samples.length; i++) { const s = Math.max(-1, Math.min(1, samples[i])); v.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true) }
      return new Blob([buf], { type: 'audio/wav' });
    }

    async function startRecording() {
      stream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1 } });
      audioCtx = new AudioContext({ sampleRate: 16000 });
      source = audioCtx.createMediaStreamSource(stream);
      processor = audioCtx.createScriptProcessor(4096, 1, 1);
      pcmBufs = [];
      processor.onaudioprocess = e => { if (isRecording) pcmBufs.push(new Float32Array(e.inputBuffer.getChannelData(0))) };
      source.connect(processor); processor.connect(audioCtx.destination);
      isRecording = true; micBtn.classList.add('recording'); iMic.style.display = 'none'; iStop.style.display = ''; status.textContent = 'Listening...';
    }

    async function stopRecording() {
      isRecording = false; processor.disconnect(); source.disconnect(); audioCtx.close();
      stream.getTracks().forEach(t => t.stop());
      micBtn.classList.remove('recording'); iMic.style.display = ''; iStop.style.display = 'none'; status.textContent = 'Processing...';

      // Merge & Encode
      const total = pcmBufs.reduce((s, b) => s + b.length, 0), merged = new Float32Array(total);
      let off = 0; pcmBufs.forEach(b => { merged.set(b, off); off += b.length });
      const wavBlob = encodeWAV(merged), fd = new FormData(); fd.append('audio', wavBlob, 'r.wav');

      // Single trip fetch with stream reading
      const res = await fetch(VOICE_URL, { method: 'POST', body: fd });
      const reader = res.body.getReader(), decoder = new TextDecoder();
      let partial = '', aiText = '', firstAudio = true;

      while (true) {
        const { done, value } = await reader.read(); if (done) break;
        partial += decoder.decode(value, { stream: true });
        const lines = partial.split('\n\n'); partial = lines.pop();
        for (const l of lines) {
          if (!l.startsWith('data: ')) continue;
          const data = JSON.parse(l.substring(6));
          if (data.type === 'stt') { addMsg('user', data.text); sStt.textContent = data.ms; statsDisp.style.display = 'flex' }
          if (data.type === 'audio') {
            aiText += data.text + ' '; audioQueue.push(b64ToBlob(data.wav)); if (!playing) playQueue();
            if (firstAudio) { status.textContent = 'Speaking...'; firstAudio = false }
          }
          if (data.type === 'done') { addMsg('ai', aiText.trim() || data.full_text); sTotal.textContent = data.total_ms; status.textContent = 'Ready' }
        }
      }
    }

    micBtn.onclick = () => isRecording ? stopRecording() : startRecording();
  </script>
</body>

</html>
