services:
  # Database
  postgres:
    image: postgres:15-alpine
    container_name: beraxis_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-beraxis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beraxis_pass}
      POSTGRES_DB: ${POSTGRES_DB:-beraxis_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U beraxis -d beraxis_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # In-memory store & message broker
  redis:
    image: redis:7-alpine
    container_name: beraxis_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  # Main API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beraxis_api
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-beraxis}:${POSTGRES_PASSWORD:-beraxis_pass}@postgres:5432/${POSTGRES_DB:-beraxis_db}
      REDIS_URL: redis://redis:6379/0
      ASTERISK_HOST: gateway
    ports:
      - "8000:8000"
      - "9092:9092"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./models:/app/models
      - ./recordings:/app/recordings

  # Celery Worker (Campaign Dialer, Aggregation)
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beraxis_celery_worker
    restart: always
    env_file: .env
    command: celery -A app.workers.celery_app worker --loglevel=info -Q default,billing,ai_tasks
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-beraxis}:${POSTGRES_PASSWORD:-beraxis_pass}@postgres:5432/${POSTGRES_DB:-beraxis_db}
      REDIS_URL: redis://redis:6379/0
      ASTERISK_HOST: gateway
    depends_on:
      - redis
      - postgres

  # Celery Beat (Cron scheduler)
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beraxis_celery_beat
    restart: always
    env_file: .env
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-beraxis}:${POSTGRES_PASSWORD:-beraxis_pass}@postgres:5432/${POSTGRES_DB:-beraxis_db}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - postgres

  # AI Worker (GPU Accelerated)
  # Uncomment this block in production if you have a GPU server
  # ai_worker:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.ai
  #   container_name: beraxis_ai_worker
  #   restart: always
  #   env_file: .env
  #   command: celery -A app.workers.celery_app worker --loglevel=info -Q ai_tasks --concurrency=1
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   volumes:
  #     - ./models:/app/models  # Map local downloaded models

  # Telephony (Asterisk 20)
  asterisk:
    image: andrius/asterisk:20
    container_name: beraxis_asterisk
    restart: always
    network_mode: host # CRITICAL: bypass Docker NAT for SIP/RTP to work correctly
    volumes:
      - ./asterisk_config/ari.conf:/etc/asterisk/ari.conf:ro
      - ./asterisk_config/http.conf:/etc/asterisk/http.conf:ro
      - ./asterisk_config/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./asterisk_config/pjsip_wizard.conf:/etc/asterisk/pjsip_wizard.conf:ro
      - ./asterisk_config/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./asterisk_config/rtp.conf:/etc/asterisk/rtp.conf:ro
      - ./asterisk_config/manager.conf:/etc/asterisk/manager.conf:ro
    environment:
      - ASTERISK_ALLOW_INSECURE_ARI=1

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: beraxis_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../dist:/usr/share/nginx/html:ro # Frontend build files
      - /etc/letsencrypt:/etc/letsencrypt:ro # SSL certificates (Let's Encrypt)
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
