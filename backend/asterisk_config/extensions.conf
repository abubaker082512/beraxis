[default]
; Dial 100 to talk to the Beraxis AI Agent
exten => 100,1,NoOp(Incoming call to Beraxis AI Agent)
 same => n,Answer()
 ; AudioSocket(UUID, IP:PORT)
 ; We use a random UUID or the channel uniqueid
 same => n,AudioSocket(${CHANNEL(uniqueid)},host.docker.internal:9092)
 same => n,Hangup()

; Standard Stasis app (for outbound or complex routing)
exten => _X.,1,NoOp(Sending call to Stasis app)
 same => n,Stasis(beraxis_app)
 same => n,Hangup()
