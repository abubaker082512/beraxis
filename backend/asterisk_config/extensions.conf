[default]
; Dial 100 to talk to the Beraxis AI Agent
exten => 100,1,NoOp(Incoming call to Beraxis AI Agent)
 same => n,Answer()
 ; We need a 16-byte ID for AudioSocket. 
 ; Asterisk uniqueid is usually something like 1234567.890
 ; We'll take the first 16 chars or pad it.
 same => n,Set(AS_UUID=${EXTEN:0:16}) ; Placeholder or use uniqueid
 same => n,AudioSocket(${CHANNEL(uniqueid):0:16},api:9092)
 same => n,Hangup()

; Standard Stasis app (for outbound or complex routing)
exten => _X.,1,NoOp(Sending call to Stasis app)
 same => n,Stasis(beraxis_app)
 same => n,Hangup()
