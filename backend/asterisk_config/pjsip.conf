[global]
type=global
user_agent=Beraxis-AI-Asterisk
endpoint_identifier_order=username,ip,header,auth_username

[system]
type=system
timer_t1=500
timer_b=32000

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_signaling_address=109.199.109.53
external_media_address=109.199.109.53
local_net=127.0.0.1/32
local_net=172.16.0.0/12
local_net=192.168.0.0/16
local_net=10.0.0.0/8

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060
external_signaling_address=109.199.109.53
external_media_address=109.199.109.53
local_net=127.0.0.1/32
local_net=172.16.0.0/12

; Consolidated Endpoint for beraxis_user
[beraxis_user_auth]
type=auth
auth_type=userpass
username=beraxis_user
password=beraxis_sip_pass

[beraxis_user_aor]
type=aor
max_contacts=5
qualify_frequency=30
remove_existing=yes

[beraxis_user]
type=endpoint
context=default
disallow=all
allow=ulaw,alaw,gsm
auth=beraxis_user_auth
outbound_auth=beraxis_user_auth
aors=beraxis_user_aor
transport=transport-udp
rewrite_contact=yes
force_rport=yes
rtp_symmetric=yes
direct_media=no
mwi_from_user=beraxis_user
aggregate_mwi=yes
allow_subscribe=yes
sub_min_expiry=30
