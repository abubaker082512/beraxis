[beraxis-endpoint]
type=endpoint
context=default
disallow=all
allow=ulaw,alaw,gsm
auth=beraxis-auth
aors=beraxis-aor
rewrite_contact=yes
force_rport=yes
direct_media=no

[beraxis-auth]
type=auth
auth_type=password
password=beraxis_sip_pass
username=beraxis_user

[beraxis-aor]
type=aor
max_contacts=5
